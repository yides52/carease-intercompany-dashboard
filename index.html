<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carease Command Corner</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, Segoe UI, Roboto, sans-serif; background: #FAF6E8; color: #1a1a1a; overflow-x: hidden; min-height: 100vh; margin: 0; }
  .bg-container { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #FAF6E8; }
  .bg-wash { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: drift 32s ease-in-out infinite; }
  .wash1 { width: 700px; height: 700px; background: #E8B4B8; top: -180px; left: -180px; animation-duration: 26s; }
  .wash2 { width: 800px; height: 800px; background: #9BB5C4; top: 20%; right: -250px; animation-duration: 30s; animation-delay: -5s; }
  .wash3 { width: 600px; height: 600px; background: #C9B896; bottom: -150px; left: 25%; animation-duration: 28s; animation-delay: -10s; }
  .wash4 { width: 550px; height: 550px; background: #A8C4A2; top: 25%; left: 45%; animation-duration: 34s; animation-delay: -15s; opacity: 0.3; }
  @keyframes drift {
    0%,100% { transform: translate(0,0) scale(1); }
    25% { transform: translate(160px,-120px) scale(1.15); }
    50% { transform: translate(-140px,160px) scale(0.9); }
    75% { transform: translate(120px,100px) scale(1.1); }
  }
  .content { position: relative; z-index: 10; }
  .btn-primary { background: #1a1a1a; color: #F5C518; font-weight: 700; border-radius: 10px; padding: 10px 18px; transition: all 0.15s; border: none; cursor: pointer; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 rgba(0,0,0,0.15); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: white; color: #1a1a1a; font-weight: 600; border-radius: 10px; padding: 8px 14px; transition: all 0.15s; border: 2px solid #1a1a1a; cursor: pointer; }
  .btn-secondary:hover { background: #F5C518; transform: translateY(-1px); }

  /* HUGE header logo */
  .logo-header { background: #1a1a1a; padding: 24px 40px; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 28px rgba(0,0,0,0.22); flex: 1; max-width: 100%; }
  .logo-header img { height: 90px; display: block; max-width: 100%; }

  /* WHEEL — SDG-style ring around black hub */
  .wheel-container { position: relative; width: 100%; max-width: 720px; aspect-ratio: 1 / 1; margin: 30px auto 20px; }
  .wheel-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .wheel-hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 46%; height: 46%; background: #1a1a1a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 0 40px rgba(245,197,24,0.08); color: #F5C518; z-index: 5; }
  .hub-label { font-size: 10px; font-weight: 800; letter-spacing: 0.3em; opacity: 0.7; }
  .hub-name { font-size: 15px; font-weight: 800; margin: 6px 0 14px; }
  .hub-dates { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .hub-input { background: #2a2a2a; border: 1px solid #F5C518; color: #F5C518; padding: 6px 8px; border-radius: 6px; font-family: inherit; font-weight: 600; font-size: 11px; width: 108px; }
  .hub-input:focus { outline: none; box-shadow: 0 0 0 2px #F5C518; }
  .hub-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; margin-bottom: 14px; cursor: pointer; }
  .hub-toggle input { width: 14px; height: 14px; accent-color: #F5C518; }
  .hub-run-btn { background: #F5C518; color: #1a1a1a; font-weight: 900; border: none; border-radius: 10px; padding: 12px 22px; cursor: pointer; font-size: 13px; letter-spacing: 0.05em; transition: all 0.15s; box-shadow: 0 4px 12px rgba(245,197,24,0.5); }
  .hub-run-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,197,24,0.7); }

  /* PC segments */
  .wheel-segment { cursor: pointer; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s; transform-origin: center; opacity: 0; animation: segIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .wheel-segment:hover { transform: scale(1.06); filter: brightness(1.1) drop-shadow(0 6px 12px rgba(0,0,0,0.35)); }
  .wheel-segment text { fill: white; font-weight: 800; pointer-events: none; user-select: none; }
  .seg-code { font-size: 15px; }
  .seg-num { font-size: 10px; opacity: 0.85; }
  @keyframes segIn {
    from { opacity: 0; transform: scale(0.4) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  /* Recent runs — clean vertical list */
  .runs-list { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .run-strip { background: #1a1a1a; color: #F5C518; padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(245,197,24,0.25); }
  .run-strip:hover { transform: translateX(4px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); border-color: rgba(245,197,24,0.6); }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-done { background: #10B981; box-shadow: 0 0 8px #10B981; }
  .status-error { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
  .status-running { background: #F59E0B; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: white; border-radius: 20px; max-width: 900px; width: 100%; max-height: 85vh; overflow-y: auto; border: 3px solid #1a1a1a; box-shadow: 8px 8px 0 #F5C518; color: #1a1a1a; }
  .pc-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 0; }
  .action-btn { padding: 20px; border-radius: 14px; border: 2px solid #1a1a1a; background: white; cursor: pointer; transition: all 0.15s; text-align: center; font-weight: 700; font-size: 14px; }
  .action-btn:hover { background: #F5C518; transform: translateY(-2px); box-shadow: 4px 4px 0 #1a1a1a; }
  .action-btn.primary { background: #1a1a1a; color: #F5C518; }
  .action-btn.primary:hover { background: #333; color: #F5C518; }
  .action-icon { font-size: 24px; display: block; margin-bottom: 6px; }
  .loader-ring { display: inline-block; width: 60px; height: 60px; position: relative; }
  .loader-ring::before, .loader-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; }
  .loader-ring::before { border-top-color: #1a1a1a; border-right-color: #1a1a1a; animation: spin 1.2s cubic-bezier(0.4,0,0.6,1) infinite; }
  .loader-ring::after { border-bottom-color: #F5C518; animation: spin 1.8s cubic-bezier(0.4,0,0.6,1) infinite reverse; inset: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-small { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }

  .modal-minimized { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; color: #F5C518; padding: 12px 20px; border-radius: 999px; font-weight: 700; cursor: pointer; z-index: 99; box-shadow: 4px 4px 0 white; display: none; align-items: center; gap: 8px; }
  .modal-minimized.show { display: flex; }

  /* NEW intro — segments fly in around a growing hub */
  .splash { position: fixed; inset: 0; z-index: 200; background: #FAF6E8; display: flex; align-items: center; justify-content: center; animation: splashFade 0.6s forwards; animation-delay: 2.6s; }
  .splash-wheel { position: relative; width: 340px; height: 340px; }
  .splash-hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(0); width: 140px; height: 140px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 40px rgba(0,0,0,0.3); animation: hubScale 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.6s forwards; }
  .splash-hub img { width: 80%; max-width: 100px; }
  .splash-seg { position: absolute; left: 50%; top: 50%; width: 40px; height: 40px; margin: -20px 0 0 -20px; border-radius: 50%; opacity: 0; }
  @keyframes hubScale { to { transform: translate(-50%,-50%) scale(1); } }
  @keyframes splashFade { to { opacity: 0; pointer-events: none; visibility: hidden; } }

  .login-card { max-width: 400px; width: 100%; padding: 40px; background: white; border: 3px solid #1a1a1a; border-radius: 20px; box-shadow: 8px 8px 0 #1a1a1a; color: #1a1a1a; }
  .input-field { width: 100%; background: white; border: 2px solid #1a1a1a; color: #1a1a1a; padding: 12px 16px; border-radius: 10px; outline: none; transition: all 0.15s; font-size: 15px; }
  .input-field:focus { box-shadow: 4px 4px 0 #F5C518; transform: translate(-1px,-1px); }
  .confirm-icon { width: 60px; height: 60px; border-radius: 50%; background: #F5C518; border: 3px solid #1a1a1a; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #1a1a1a; font-size: 32px; font-weight: 900; box-shadow: 4px 4px 0 #1a1a1a; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; border: 2px solid #1a1a1a; }
  .badge-done { background: #10B981; color: white; }
  .badge-error { background: #EF4444; color: white; }
  .badge-partial { background: #F59E0B; color: white; }

  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .top-actions { display: flex; gap: 8px; align-items: center; }

  @media (max-width: 640px) {
    .logo-header { padding: 16px 24px; }
    .logo-header img { height: 64px; }
    .wheel-container { max-width: 380px; }
    .hub-name { font-size: 12px; }
    .hub-input { width: 88px; font-size: 10px; }
    .hub-run-btn { padding: 10px 16px; font-size: 12px; }
    .seg-code { font-size: 12px; }
    .seg-num { font-size: 8px; }
  }
</style>
</head>
<body>
<div class="splash" id="splash"><div class="splash-wheel" id="splashWheel"><div class="splash-hub"><img src="logo.png" alt=""></div></div></div>
<div class="bg-container"><div class="bg-wash wash1"></div><div class="bg-wash wash2"></div><div class="bg-wash wash3"></div><div class="bg-wash wash4"></div></div>

<div id="loginScreen" class="content min-h-screen flex items-center justify-center p-4" style="display:none;">
  <div class="login-card">
    <div class="text-center mb-6"><div style="background:#1a1a1a;padding:20px;border-radius:16px;display:inline-block;"><img src="logo.png" alt="Carease Command Corner" style="height:100px;"></div></div>
    <div id="loginError" class="text-red-500 text-sm mb-3 text-center" style="display:none;"></div>
    <div class="space-y-3">
      <input id="loginUser" class="input-field" placeholder="Username" autocomplete="username">
      <input id="loginPass" type="password" class="input-field" placeholder="Password" autocomplete="current-password">
      <label class="flex items-center gap-2 text-sm"><input id="rememberMe" type="checkbox" class="w-4 h-4 accent-black" checked>Remember me for 30 days</label>
      <button onclick="doLogin()" id="loginBtn" class="btn-primary w-full">Sign In</button>
    </div>
  </div>
</div>

<div id="app" class="content max-w-6xl mx-auto px-4 py-6" style="display:none;">
  <div class="top-bar">
    <div class="logo-header"><img src="logo.png" alt="Carease Command Corner"></div>
  </div>
  <div class="top-actions mb-6 flex-wrap">
    <span id="loggedInAs" class="text-xs mr-2 font-bold"></span>
    <button onclick="connectMain()" class="btn-secondary text-sm">+ Main</button>
    <button onclick="connectPC()" class="btn-primary text-sm">+ PC</button>
    <button onclick="doLogout()" class="btn-secondary text-sm">Logout</button>
    <button onclick="loadOrgs()" class="btn-secondary text-sm ml-auto">↻ Refresh</button>
  </div>

  <div id="orgsLoading" class="text-center py-8"><div class="loader-ring"></div></div>
  <div id="orgsContainer"></div>

  <div class="mb-6 mt-8">
    <h2 class="text-lg font-bold mb-3">Recent Runs</h2>
    <div id="runsList" class="runs-list">Loading...</div>
  </div>
</div>

<div id="confirmModal" class="modal-backdrop"><div class="modal p-6" style="max-width: 480px;"><div class="confirm-icon" id="confirmIcon">▶</div><h3 class="text-xl font-bold text-center mb-2" id="confirmTitle">Confirm Run</h3><p class="text-center mb-6" id="confirmBody"></p><div class="flex gap-3"><button onclick="closeConfirm()" class="btn-secondary flex-1">Cancel</button><button onclick="acceptConfirm()" class="btn-primary flex-1">Continue</button></div></div></div>
<div id="modal" class="modal-backdrop"><div class="modal p-6"><div class="flex items-center justify-between mb-4"><h3 id="modalTitle" class="text-xl font-bold">Result</h3><div class="flex gap-2"><button onclick="minimizeModal()" class="btn-secondary text-sm">−</button><button onclick="closeModal()" class="btn-secondary text-sm">×</button></div></div><div id="modalBody"></div></div></div>
<div id="modalChip" class="modal-minimized" onclick="reopenModal()"><span id="modalChipText">Results ready</span><span style="opacity:0.7;">↗</span></div><script>
const API = 'https://carease-intercompany-production.up.railway.app';
const TOKEN_KEY = 'carease_session_token';
let sessionToken = localStorage.getItem(TOKEN_KEY) || null;
let orgs = [];
let currentUsername = null;
let currentModalContent = null;
let audioCtx = null;

// SDG-style rich jewel palette (17 colors, muted/serious)
const SEG_COLORS = [
  '#C9433E', '#D6A429', '#4C9F38', '#26BDE2', '#FD6925', '#A21942', '#FCC30B',
  '#FD9D24', '#DDA63A', '#3F7E44', '#0A97D9', '#56C02B', '#00689D', '#19486A',
  '#8F1838', '#E5243B', '#7F4E80'
];

// Intro segments animation
function playIntroSegments() {
  const wheel = document.getElementById('splashWheel');
  if (!wheel) return;
  const n = 14;
  const R = 130;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * R;
    const y = Math.sin(angle) * R;
    const seg = document.createElement('div');
    seg.className = 'splash-seg';
    seg.style.background = SEG_COLORS[i % SEG_COLORS.length];
    const delay = i * 80;
    seg.animate([
      { transform: 'translate(0,0) scale(0.3)', opacity: 0 },
      { transform: 'translate(' + x + 'px,' + y + 'px) scale(1)', opacity: 1 }
    ], { duration: 700, delay: delay, easing: 'cubic-bezier(0.34,1.56,0.64,1)', fill: 'forwards' });
    wheel.appendChild(seg);
  }
}
playIntroSegments();

setTimeout(() => {
  document.getElementById('splash').style.display = 'none';
  if (sessionToken) checkSession(); else showLogin();
}, 3300);

function initDates() {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  return { start: first.toISOString().slice(0,10), end: last.toISOString().slice(0,10) };
}
let defaultDates = initDates();

async function checkSession() {
  try {
    const r = await fetch(API + '/auth/me', {headers: {'X-Session-Token': sessionToken}});
    if (r.ok) { const data = await r.json(); currentUsername = data.username; showApp(); }
    else { localStorage.removeItem(TOKEN_KEY); sessionToken = null; showLogin(); }
  } catch (e) { showLogin(); }
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const remember = document.getElementById('rememberMe').checked;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Enter username and password'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="loader-small"></span> Signing in...';
  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if (r.ok && data.token) {
      sessionToken = data.token;
      if (remember) localStorage.setItem(TOKEN_KEY, sessionToken);
      currentUsername = data.username;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
      showApp();
    } else { errEl.textContent = 'Invalid username or password'; errEl.style.display = 'block'; }
  } catch (e) { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
  btn.disabled = false;
  btn.innerHTML = 'Sign In';
}

document.addEventListener('keypress', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin();
});

async function doLogout() {
  if (!confirm('Log out?')) return;
  try { await fetch(API + '/auth/logout', {method: 'POST', headers: {'X-Session-Token': sessionToken}}); } catch (e) {}
  localStorage.removeItem(TOKEN_KEY);
  sessionToken = null;
  currentUsername = null;
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loggedInAs').textContent = currentUsername ? '@' + currentUsername : '';
  loadOrgs();
  loadRuns();
}

async function api(path) {
  const r = await fetch(API + path, {headers: {'X-Session-Token': sessionToken}});
  if (r.status === 401) { showLogin(); throw new Error('Session expired'); }
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

function connectMain() { window.location.href = API + '/connect?role=main'; }
function connectPC() { window.location.href = API + '/connect?role=pc'; }

async function loadOrgs() {
  document.getElementById('orgsLoading').style.display = 'block';
  document.getElementById('orgsContainer').innerHTML = '';
  try { orgs = await api('/orgs'); renderWheel(); }
  catch (e) { document.getElementById('orgsContainer').innerHTML = '<p class="text-red-500 text-center">' + e.message + '</p>'; }
  finally { document.getElementById('orgsLoading').style.display = 'none'; }
}

function shortLabel(name) {
  const stateMatch = name.match(/\b([A-Z]{2})\b/);
  const pcMatch = name.match(/(PC|P\.C\.|P\.A\.)\s*(\d+)/i);
  const top = stateMatch ? stateMatch[1] : (name.length > 8 ? name.slice(0,7) : name);
  const bottom = pcMatch ? pcMatch[0].replace(/\s+/g,' ').toUpperCase() : '';
  return { top, bottom };
}

function polarToCart(cx, cy, r, angle) {
  return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
}

// Build donut-slice path
function slicePath(cx, cy, rIn, rOut, a1, a2) {
  const p1 = polarToCart(cx, cy, rOut, a1);
  const p2 = polarToCart(cx, cy, rOut, a2);
  const p3 = polarToCart(cx, cy, rIn, a2);
  const p4 = polarToCart(cx, cy, rIn, a1);
  const large = (a2 - a1) > Math.PI ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 ${large} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
}

function renderWheel() {
  const main = orgs.find(c => c.role === 'main');
  const pcs = orgs.filter(c => c.role === 'pc');
  const container = document.getElementById('orgsContainer');

  if (!main && !pcs.length) {
    container.innerHTML = '<p class="text-center py-8 opacity-70">No organizations connected. Click <b>+ Main</b> and <b>+ PC</b> above.</p>';
    return;
  }

  const size = 720;
  const cx = size / 2, cy = size / 2;
  const rOut = 340;
  const rIn = 195;
  const gap = 0.012; // radians between segs
  const n = Math.max(pcs.length, 1);

  let svgSegs = '';
  let labels = '';
  for (let i = 0; i < pcs.length; i++) {
    const a1 = (i / n) * Math.PI * 2 - Math.PI / 2 + gap;
    const a2 = ((i + 1) / n) * Math.PI * 2 - Math.PI / 2 - gap;
    const color = SEG_COLORS[i % SEG_COLORS.length];
    const path = slicePath(cx, cy, rIn, rOut, a1, a2);
    const mid = (a1 + a2) / 2;
    const labelR = (rIn + rOut) / 2;
    const lp = polarToCart(cx, cy, labelR, mid);
    const s = shortLabel(pcs[i].name);
    const delay = (i * 0.04);
    const escapedName = pcs[i].name.replace(/'/g, "\\'").replace(/"/g,'&quot;');
    svgSegs += `<g class="wheel-segment" style="animation-delay:${delay}s;" onclick="openPCActions('${pcs[i].realm_id}')">`
      + `<title>${escapedName}</title>`
      + `<path d="${path}" fill="${color}"/>`
      + `<text class="seg-code" x="${lp.x}" y="${lp.y - 4}" text-anchor="middle" dominant-baseline="middle">${s.top}</text>`
      + (s.bottom ? `<text class="seg-num" x="${lp.x}" y="${lp.y + 12}" text-anchor="middle" dominant-baseline="middle">${s.bottom}</text>` : '')
      + `</g>`;
  }

  const mainName = main ? main.name : 'No Main';
  let html = '<div class="wheel-container">';
  html += `<svg class="wheel-svg" viewBox="0 0 ${size} ${size}">${svgSegs}</svg>`;
  html += '<div class="wheel-hub">';
  html += `<div class="hub-label">MAIN</div>`;
  html += `<div class="hub-name">${mainName}</div>`;
  html += '<div class="hub-dates">';
  html += `<input id="startDate" type="date" class="hub-input" value="${defaultDates.start}">`;
  html += `<span style="opacity:0.5;font-size:12px;">→</span>`;
  html += `<input id="endDate" type="date" class="hub-input" value="${defaultDates.end}">`;
  html += '</div>';
  html += '<label class="hub-toggle"><input id="dryRunToggle" type="checkbox" checked>Dry Run</label>';
  html += `<button class="hub-run-btn" onclick="askRunAll()">▶ RUN ALL PCs</button>`;
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;
}

let selectedPC = null;
function openPCActions(realmId) {
  const org = orgs.find(c => c.realm_id === realmId);
  if (!org) return;
  selectedPC = org;
  const isMain = org.role === 'main';
  const safeName = org.name.replace(/'/g, "\\'");
  let html = '<p class="text-center opacity-70 mb-3">Realm <span class="font-mono">' + org.realm_id + '</span></p>';
  html += '<div class="pc-actions">';
  if (!isMain) {
    html += '<div class="action-btn" onclick="closeModal();syncPC(\'' + realmId + '\')"><span class="action-icon">🔄</span>Sync Items & Accounts</div>';
    html += '<div class="action-btn" onclick="closeModal();dryRunPC(\'' + realmId + '\')"><span class="action-icon">👁</span>Dry Run</div>';
    html += '<div class="action-btn primary" onclick="closeModal();askRunPC(\'' + realmId + '\',\'' + safeName + '\')"><span class="action-icon">▶</span>Run for Real</div>';
    html += '<div class="action-btn" onclick="closeModal();viewFlagged(\'' + realmId + '\')"><span class="action-icon">⚑</span>View Flagged</div>';
  } else {
    html += '<div class="action-btn" style="grid-column:1/-1;"><span class="action-icon">👑</span>Main Company<div class="text-xs opacity-60 mt-1">Runs affect this org as source</div></div>';
  }
  html += '</div>';
  openModal(org.name, html);
}

async function syncPC(realmId) {
  openModal('Syncing...', '<div class="text-center py-8"><div class="loader-ring"></div></div>');
  try {
    const r = await api('/sync/' + realmId);
    openModal('Synced ✓', '<div class="space-y-2"><p class="font-bold text-lg">' + r.name + '</p><p>Items: ' + r.items + '</p><p>Accounts: ' + r.accounts + '</p></div>');
  } catch (e) { openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); }
}

function askRunPC(realmId, name) { showConfirm('Confirm Real Run', 'This will create a real invoice and bill in QBO for <b>' + name + '</b>. Continue?', '⚠', () => runPC(realmId)); }
function askRunAll() {
  const dry = document.getElementById('dryRunToggle').checked;
  const pcs = orgs.filter(c => c.role === 'pc');
  if (!pcs.length) return alert('No PCs to run');
  if (dry) showConfirm('Dry Run All PCs', 'Preview all ' + pcs.length + ' PCs. Nothing posted.', '👁', runAll);
  else showConfirm('REAL Run All PCs', 'Create REAL invoices and bills for ALL ' + pcs.length + ' PCs?', '⚠', runAll);
}

function getDates() {
  return { start: document.getElementById('startDate').value, end: document.getElementById('endDate').value };
}

async function dryRunPC(realmId) {
  const d = getDates();
  if (!d.start || !d.end) return alert('Pick a date range');
  openModal('Running dry-run...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Analyzing expenses...</p></div>');
  try {
    const r = await api('/run/' + realmId + '?start=' + d.start + '&end=' + d.end + '&dry_run=true');
    openModal('Dry Run Result', renderRunResult(r));
  } catch (e) { openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); }
}

async function runPC(realmId) {
  const d = getDates();
  if (!d.start || !d.end) return alert('Pick a date range');
  openModal('Running...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Creating invoice and bill...</p></div>');
  try {
    const r = await api('/run/' + realmId + '?start=' + d.start + '&end=' + d.end);
    if (r.status === 'done') playDing();
    openModal('Done ✓', renderRunResult(r));
    loadRuns();
  } catch (e) { openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); }
}

async function runAll() {
  const dry = document.getElementById('dryRunToggle').checked;
  const pcs = orgs.filter(c => c.role === 'pc');
  const d = getDates();
  openModal(dry ? 'Dry Running All PCs' : 'Running All PCs', '<div id="allResults" class="space-y-2"></div>');
  const results = document.getElementById('allResults');
  const summary = { success: 0, error: 0, partial: 0 };
  for (const pc of pcs) {
    const row = document.createElement('div');
    row.className = 'p-3 rounded-lg border-2 border-black bg-white flex items-center gap-3';
    row.innerHTML = '<span class="loader-small"></span><span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs opacity-60">running...</span>';
    results.appendChild(row);
    try {
      const r = await api('/run/' + pc.realm_id + '?start=' + d.start + '&end=' + d.end + (dry ? '&dry_run=true' : ''));
      let badge, detail;
      if (r.status === 'error') { badge = '<span class="badge badge-error">Error</span>'; detail = r.error || 'Failed'; summary.error++; }
      else if (r.status === 'partial') { badge = '<span class="badge badge-partial">Partial</span>'; detail = r.error || 'Partial'; summary.partial++; }
      else if (r.dry_run) { badge = '<span class="badge badge-done">Preview</span>'; detail = (r.billable_expenses_found||0) + ' lines · $' + (r.subtotal||0).toFixed(2) + ' · MSA $' + (r.msa_amount_20pct||0).toFixed(2); summary.success++; }
      else { badge = '<span class="badge badge-done">Done</span>'; detail = '#' + r.doc_number + ' · ' + r.lines_total + ' lines · ' + (r.lines_flagged||0) + ' flagged'; summary.success++; playDing(); }
      row.innerHTML = badge + '<span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs opacity-70">' + detail + '</span>';
    } catch (e) {
      row.innerHTML = '<span class="badge badge-error">Error</span><span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs text-red-600">' + e.message + '</span>';
      summary.error++;
    }
  }
  const banner = document.createElement('div');
  banner.className = 'mt-4 p-4 rounded-xl';
  banner.style = 'background: #1a1a1a; color: #F5C518; border: 3px solid #1a1a1a;';
  banner.innerHTML = '<div class="flex items-center gap-4 justify-center text-sm font-bold"><span>✓ ' + summary.success + ' success</span><span>⚠ ' + summary.partial + ' partial</span><span>✗ ' + summary.error + ' failed</span></div>';
  results.appendChild(banner);
  if (!dry) loadRuns();
}

function renderRunResult(r) {
  if (r.error && !r.status) return '<p class="text-red-600 font-bold">' + r.error + ': ' + (r.detail || '') + '</p>';
  if (r.dry_run) {
    let html = '<div class="grid grid-cols-2 gap-3 mb-4 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">State:</span> <b>' + r.state_code + '</b></div><div><span class="opacity-60">Period:</span> ' + r.period + '</div><div><span class="opacity-60">Expenses:</span> ' + r.billable_expenses_found + '</div><div><span class="opacity-60">Subtotal:</span> $' + r.subtotal.toFixed(2) + '</div><div><span class="opacity-60">MSA (20%):</span> $' + r.msa_amount_20pct.toFixed(2) + '</div><div class="col-span-2 pt-2 border-t border-black"><span class="opacity-60">Invoice Total:</span> <span class="text-lg font-bold">$' + r.invoice_total.toFixed(2) + '</span></div><div class="col-span-2 text-xs opacity-70">Next #: <b>' + (r.next_doc_number || '?') + '</b></div><div class="col-span-2 text-xs opacity-70">MSA Main: <b>' + (r.msa_item_lookup_main || '?') + '</b></div><div class="col-span-2 text-xs opacity-70">MSA PC: <b>' + (r.msa_item_lookup_pc || '?') + '</b></div></div><h4 class="font-bold mb-2 text-sm uppercase tracking-wide">Line Items</h4><div class="space-y-2">';
    for (const l of r.line_previews) {
      const dot = l.confidence === 'high' ? '🟢' : (l.confidence === 'low' ? '🟡' : '🔴');
      html += '<div class="p-3 rounded-lg border-2 border-black"><div class="flex justify-between items-start gap-2"><span class="text-sm">' + dot + ' ' + l.description + '</span><b>$' + l.amount.toFixed(2) + '</b></div><div class="text-xs opacity-70 mt-1">' + (l.reasoning || '') + '</div></div>';
    }
    html += '</div><p class="mt-4 text-xs italic opacity-60 text-center">' + r.note + '</p>';
    return html;
  }
  if (r.status === 'done') {
    return '<div class="space-y-3 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">Invoice:</span> <b>#' + (r.doc_number || r.invoice_id) + '</b></div><div><span class="opacity-60">Bill created:</span> id ' + (r.bill_id || '?') + '</div><div><span class="opacity-60">Lines:</span> ' + r.lines_total + ' · ' + (r.lines_flagged || 0) + ' flagged</div><div class="pt-3 mt-3 border-t border-black text-center"><span class="badge badge-done">✓ Complete</span></div></div>';
  }
  if (r.status === 'partial') {
    return '<div class="space-y-2 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">Invoice created:</span> <b>#' + (r.doc_number || r.invoice_id) + '</b></div><div class="text-orange-600"><b>Issue:</b> ' + r.error + '</div></div>';
  }
  return '<pre class="text-xs bg-gray-100 p-3 rounded overflow-x-auto">' + JSON.stringify(r, null, 2) + '</pre>';
}

async function viewFlagged(realmId) {
  openModal('Loading flagged...', '<div class="text-center py-8"><div class="loader-ring"></div></div>');
  try {
    const r = await api('/flagged/' + realmId);
    if (!r.flagged.length) { openModal(r.name + ' — Flagged', '<p class="text-center py-4">No flagged items 🎉</p>'); return; }
    let html = '<div class="space-y-2">';
    for (const f of r.flagged) {
      html += '<div class="p-3 rounded-lg border-2 border-black"><div class="font-bold text-sm">' + f.description + '</div><div class="text-xs opacity-70 mt-1">' + f.reasoning + '</div><div class="text-xs mt-2">Confidence: <b>' + f.confidence + '</b></div></div>';
    }
    html += '</div>';
    openModal(r.name + ' — Flagged', html);
  } catch (e) { openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); }
}

async function loadRuns() {
  const el = document.getElementById('runsList');
  el.innerHTML = '<div class="text-center py-4"><div class="loader-small"></div></div>';
  try {
    const runs = await api('/runs');
    if (!runs.length) { el.innerHTML = '<p class="text-center py-4 opacity-60">No runs yet</p>'; return; }
    let html = '';
    for (const r of runs) {
      const cls = r.status === 'done' ? 'status-done' : (r.status === 'error' ? 'status-error' : 'status-running');
      const when = new Date(r.started_at).toLocaleString();
      const org = r.companies || {};
      const runData = encodeURIComponent(JSON.stringify(r));
      const docLabel = r.invoice_id ? ('Invoice #' + (r.doc_number || r.invoice_id)) : ('Run ' + r.id);
      html += '<div class="run-strip" onclick="viewRunDetail(\'' + runData + '\')">'
        + '<span class="status-dot ' + cls + '"></span>'
        + '<div class="flex-1 min-w-0">'
          + '<div class="font-bold truncate">' + docLabel + ' · ' + (org.name || '?') + '</div>'
          + '<div class="text-xs opacity-70">' + r.period_start + ' → ' + r.period_end + ' · ' + (r.lines_total || 0) + ' lines · ' + (r.lines_flagged || 0) + ' flagged</div>'
        + '</div>'
        + '<div class="text-xs opacity-60 text-right flex-shrink-0 hidden sm:block">' + when + '</div>'
        + '</div>';
    }
    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<p class="text-red-600">' + e.message + '</p>'; }
}

function viewRunDetail(encoded) {
  const r = JSON.parse(decodeURIComponent(encoded));
  const org = r.companies || {};
  const cls = r.status === 'done' ? 'badge-done' : (r.status === 'error' ? 'badge-error' : 'badge-partial');
  let html = '<div class="space-y-3 text-sm"><div><span class="opacity-60">Company:</span> <b>' + (org.name || '?') + '</b></div><div><span class="opacity-60">Period:</span> ' + r.period_start + ' to ' + r.period_end + '</div><div><span class="opacity-60">Status:</span> <span class="badge ' + cls + '">' + r.status + '</span></div><div><span class="opacity-60">Started:</span> ' + new Date(r.started_at).toLocaleString() + '</div>';
  if (r.finished_at) html += '<div><span class="opacity-60">Finished:</span> ' + new Date(r.finished_at).toLocaleString() + '</div>';
  if (r.invoice_id) html += '<div><span class="opacity-60">Invoice ID:</span> <b>' + r.invoice_id + '</b></div>';
  if (r.bill_id) html += '<div><span class="opacity-60">Bill ID:</span> <b>' + r.bill_id + '</b></div>';
  html += '<div><span class="opacity-60">Lines total:</span> ' + (r.lines_total || 0) + '</div><div><span class="opacity-60">Lines flagged:</span> ' + (r.lines_flagged || 0) + '</div>';
  if (r.error_message) html += '<div class="text-red-600 pt-2 border-t border-black"><b>Error:</b> ' + r.error_message + '</div>';
  html += '</div>';
  openModal('Run Details', html);
}

function openModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  currentModalContent = {title: title, body: body};
  document.getElementById('modalChip').classList.remove('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalChip').classList.remove('show');
  currentModalContent = null;
}
function minimizeModal() {
  document.getElementById('modal').classList.remove('open');
  if (currentModalContent) {
    document.getElementById('modalChipText').textContent = currentModalContent.title;
    document.getElementById('modalChip').classList.add('show');
  }
}
function reopenModal() {
  if (currentModalContent) {
    document.getElementById('modal').classList.add('open');
    document.getElementById('modalChip').classList.remove('show');
  }
}

let confirmCallback = null;
function showConfirm(title, body, icon, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').innerHTML = body;
  document.getElementById('confirmIcon').textContent = icon || '▶';
  confirmCallback = callback;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  confirmCallback = null;
}
function acceptConfirm() {
  const cb = confirmCallback;
  closeConfirm();
  if (cb) cb();
}

function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
  } catch (e) {}
}
</script>
