<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carease Command Corner</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, Segoe UI, Roboto, sans-serif; background: #F5C518; color: #1a1a1a; overflow-x: hidden; min-height: 100vh; margin: 0; }
  .bg-container { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: linear-gradient(135deg, #F5C518 0%, #FFD449 100%); }
  .bg-wash { position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.55; animation: drift 32s ease-in-out infinite; }
  .wash1 { width: 700px; height: 700px; background: #C62828; top: -200px; left: -200px; animation-duration: 26s; }
  .wash2 { width: 800px; height: 800px; background: #00838F; top: 20%; right: -280px; animation-duration: 30s; animation-delay: -5s; }
  .wash3 { width: 600px; height: 600px; background: #4527A0; bottom: -180px; left: 25%; animation-duration: 28s; animation-delay: -10s; }
  .wash4 { width: 550px; height: 550px; background: #EF6C00; top: 25%; left: 45%; animation-duration: 34s; animation-delay: -15s; opacity: 0.4; }
  @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 25% { transform: translate(160px,-120px) scale(1.15); } 50% { transform: translate(-140px,160px) scale(0.9); } 75% { transform: translate(120px,100px) scale(1.1); } }
  .content { position: relative; z-index: 10; }
  .btn-primary { background: #1a1a1a; color: #F5C518; font-weight: 700; border-radius: 10px; padding: 10px 18px; transition: all 0.15s; border: none; cursor: pointer; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 rgba(0,0,0,0.15); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: white; color: #1a1a1a; font-weight: 600; border-radius: 10px; padding: 8px 14px; transition: all 0.15s; border: 2px solid #1a1a1a; cursor: pointer; }
  .btn-secondary:hover { background: #F5C518; transform: translateY(-1px); }

  .logo-corner { position: fixed; top: 20px; left: 20px; z-index: 55; display: flex; align-items: center; gap: 12px; }
  .logo-corner img { height: 130px; display: block; border-radius: 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.28); transition: transform 0.2s; }
  .logo-corner img:hover { transform: scale(1.04); }
  .logo-tagline { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.55; line-height: 1.4; max-width: 80px; }

  .fab-menu { position: fixed; top: 20px; right: 20px; z-index: 60; }
  .fab-btn { width: 52px; height: 52px; border-radius: 50%; background: #1a1a1a; color: #F5C518; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.2s; }
  .fab-btn:hover { transform: rotate(90deg) scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .fab-panel { position: absolute; top: 62px; right: 0; background: white; border: 3px solid #1a1a1a; border-radius: 16px; padding: 10px; box-shadow: 6px 6px 0 #1a1a1a; min-width: 200px; display: none; flex-direction: column; gap: 6px; }
  .fab-panel.open { display: flex; }
  .fab-item { padding: 10px 14px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; text-align: left; background: transparent; border: none; color: #1a1a1a; transition: all 0.1s; }
  .fab-item:hover { background: #F5C518; }
  .fab-item.primary { background: #1a1a1a; color: #F5C518; }
  .fab-item.primary:hover { background: #333; }
  .fab-user { padding: 8px 14px; font-size: 12px; opacity: 0.6; border-bottom: 1px solid #eee; margin-bottom: 4px; font-weight: 700; }

  .wheel-stage { min-height: calc(100vh - 260px); display: flex; align-items: center; justify-content: center; padding: 20px 0; padding-top: 160px; }
  .wheel-outer { perspective: 1600px; width: 100%; max-width: min(92vw, 880px); margin: 0 auto; }
  .wheel-container { position: relative; width: 100%; aspect-ratio: 1 / 1; transform: rotateX(18deg); animation: breathe 5s ease-in-out infinite; filter: drop-shadow(0 16px 0 rgba(0,0,0,0.35)) drop-shadow(0 26px 34px rgba(0,0,0,0.42)); }
  @keyframes breathe { 0%,100% { transform: rotateX(18deg) scale(1); } 50% { transform: rotateX(18deg) scale(1.015); } }
  .wheel-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .wheel-hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 46%; height: 46%; background: radial-gradient(circle at 35% 30%, #2a2a2a 0%, #0a0a0a 100%); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; text-align: center; box-shadow: 0 14px 40px rgba(0,0,0,0.5), inset 0 4px 20px rgba(245,197,24,0.08), inset 0 -4px 20px rgba(0,0,0,0.5); color: #F5C518; z-index: 5; border: 3px solid #F5C518; }
  .hub-label { font-size: 11px; font-weight: 800; letter-spacing: 0.3em; opacity: 0.7; }
  .hub-name { font-size: 17px; font-weight: 800; margin: 8px 0 18px; }
  .hub-dates { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .hub-input { background: #2a2a2a; border: 1px solid #F5C518; color: #F5C518; padding: 7px 10px; border-radius: 6px; font-family: inherit; font-weight: 600; font-size: 12px; width: 122px; }
  .hub-input:focus { outline: none; box-shadow: 0 0 0 2px #F5C518; }
  .hub-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 18px; cursor: pointer; }
  .hub-toggle input { width: 14px; height: 14px; accent-color: #F5C518; }
  .hub-run-btn { background: #F5C518; color: #1a1a1a; font-weight: 900; border: none; border-radius: 10px; padding: 13px 26px; cursor: pointer; font-size: 14px; letter-spacing: 0.05em; transition: all 0.15s; box-shadow: 0 4px 12px rgba(245,197,24,0.6); }
  .hub-run-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,197,24,0.8); }

  .wheel-segment { cursor: pointer; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s; transform-origin: center; opacity: 0; animation: segIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards, segWave 4s ease-in-out infinite; }
  .wheel-segment:hover { transform: scale(1.06); filter: brightness(1.15) drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }
  .wheel-segment text { fill: white; font-weight: 800; pointer-events: none; user-select: none; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .seg-code { font-size: 16px; }
  .seg-num { font-size: 11px; opacity: 0.85; }
  @keyframes segIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
  @keyframes segWave { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.12); } }

  .runs-list { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .run-strip { background: #1a1a1a; color: #F5C518; padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(245,197,24,0.25); }
  .run-strip:hover { transform: translateX(4px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); border-color: rgba(245,197,24,0.6); }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-done { background: #10B981; box-shadow: 0 0 8px #10B981; }
  .status-error { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
  .status-running { background: #F59E0B; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: white; border-radius: 20px; max-width: 900px; width: 100%; max-height: 85vh; overflow-y: auto; border: 3px solid #1a1a1a; box-shadow: 8px 8px 0 #F5C518; color: #1a1a1a; }
  .pc-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 0; }
  .action-btn { padding: 20px; border-radius: 14px; border: 2px solid #1a1a1a; background: white; cursor: pointer; transition: all 0.15s; text-align: center; font-weight: 700; font-size: 14px; }
  .action-btn:hover { background: #F5C518; transform: translateY(-2px); box-shadow: 4px 4px 0 #1a1a1a; }
  .action-btn.primary { background: #1a1a1a; color: #F5C518; }
  .action-btn.primary:hover { background: #333; color: #F5C518; }
  .action-icon { font-size: 24px; display: block; margin-bottom: 6px; }
  .loader-ring { display: inline-block; width: 60px; height: 60px; position: relative; }
  .loader-ring::before, .loader-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; }
  .loader-ring::before { border-top-color: #1a1a1a; border-right-color: #1a1a1a; animation: spin 1.2s cubic-bezier(0.4,0,0.6,1) infinite; }
  .loader-ring::after { border-bottom-color: #F5C518; animation: spin 1.8s cubic-bezier(0.4,0,0.6,1) infinite reverse; inset: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-small { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }

  .result-float { position: fixed; bottom: 20px; right: 20px; width: 320px; max-width: calc(100vw - 40px); background: #1a1a1a; color: #F5C518; border: 2px solid #F5C518; border-radius: 16px; padding: 14px 16px; z-index: 99; box-shadow: 0 12px 32px rgba(0,0,0,0.4); cursor: pointer; display: none; animation: slideUp 0.3s ease-out; transition: all 0.2s; }
  .result-float:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(0,0,0,0.5); }
  .result-float.show { display: block; }
  .result-float-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .result-float-title { font-weight: 800; font-size: 14px; flex: 1; }
  .result-float-status { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 700; }
  .result-float-status.running { background: #F59E0B; color: white; }
  .result-float-status.done { background: #10B981; color: white; }
  .result-float-status.error { background: #EF4444; color: white; }
  .result-float-body { font-size: 12px; opacity: 0.85; line-height: 1.4; }
  .result-float-cta { font-size: 11px; margin-top: 8px; opacity: 0.6; font-weight: 700; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .splash { position: fixed; inset: 0; z-index: 200; background: #F5C518; display: flex; align-items: center; justify-content: center; animation: splashFade 0.6s forwards; animation-delay: 2.8s; }
  .splash-wheel { position: relative; width: 480px; height: 480px; }
  .splash-hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(0); width: 240px; height: 240px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 14px 40px rgba(0,0,0,0.3); animation: hubScale 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards; overflow: hidden; }
  .splash-hub img { width: 100%; height: 100%; object-fit: cover; }
  .splash-seg { position: absolute; left: 50%; top: 50%; width: 44px; height: 44px; margin: -22px 0 0 -22px; border-radius: 50%; opacity: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.25); }
  @keyframes hubScale { to { transform: translate(-50%,-50%) scale(1); } }
  @keyframes splashFade { to { opacity: 0; pointer-events: none; visibility: hidden; } }

  .login-card { max-width: 460px; width: 100%; padding: 40px; background: white; border: 3px solid #1a1a1a; border-radius: 20px; box-shadow: 8px 8px 0 #1a1a1a; color: #1a1a1a; }
  .login-tagline { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.55; margin-top: 10px; }
  .input-field { width: 100%; background: white; border: 2px solid #1a1a1a; color: #1a1a1a; padding: 12px 16px; border-radius: 10px; outline: none; transition: all 0.15s; font-size: 15px; }
  .input-field:focus { box-shadow: 4px 4px 0 #F5C518; transform: translate(-1px,-1px); }
  .confirm-icon { width: 60px; height: 60px; border-radius: 50%; background: #F5C518; border: 3px solid #1a1a1a; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #1a1a1a; font-size: 32px; font-weight: 900; box-shadow: 4px 4px 0 #1a1a1a; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; border: 2px solid #1a1a1a; }
  .badge-done { background: #10B981; color: white; }
  .badge-error { background: #EF4444; color: white; }
  .badge-partial { background: #F59E0B; color: white; }

  .modal-close-btn { display: inline-block; }
  .modal-close-btn.hidden { display: none !important; }

  .runs-section { padding: 0 20px; }

  .flag-group-header { padding: 12px 16px; background: #1a1a1a; color: #F5C518; border-radius: 10px; font-weight: 800; margin: 16px 0 10px; font-size: 14px; }
  .flag-item { padding: 16px; border: 2px solid #F59E0B; border-radius: 12px; background: #FFFBEB; margin-bottom: 10px; }
  .flag-desc { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .flag-meta { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
  .flag-reason { font-size: 11px; font-style: italic; opacity: 0.6; margin-bottom: 10px; }
  .flag-select { width: 100%; padding: 10px 12px; border: 2px solid #1a1a1a; border-radius: 8px; font-family: inherit; font-weight: 600; background: white; cursor: pointer; }
  .flag-select:focus { outline: none; box-shadow: 3px 3px 0 #F5C518; }

  @media (max-width: 640px) {
    .logo-corner img { height: 90px; }
    .logo-corner { top: 12px; left: 12px; gap: 8px; }
    .logo-tagline { font-size: 8px; max-width: 65px; }
    .fab-menu { top: 12px; right: 12px; }
    .fab-btn { width: 44px; height: 44px; font-size: 20px; }
    .wheel-stage { min-height: calc(100vh - 200px); padding-top: 130px; }
    .hub-name { font-size: 13px; margin: 6px 0 12px; }
    .hub-input { width: 92px; font-size: 10px; padding: 5px 8px; }
    .hub-run-btn { padding: 10px 18px; font-size: 12px; }
    .seg-code { font-size: 12px; }
    .seg-num { font-size: 8px; }
    .result-float { width: calc(100vw - 24px); bottom: 12px; right: 12px; }
    .splash-wheel { width: 340px; height: 340px; }
    .splash-hub { width: 170px; height: 170px; }
  }
</style>
</head>
<body>
<div class="splash" id="splash"><div class="splash-wheel" id="splashWheel"><div class="splash-hub"><img src="logo.png" alt=""></div></div></div>
<div class="bg-container"><div class="bg-wash wash1"></div><div class="bg-wash wash2"></div><div class="bg-wash wash3"></div><div class="bg-wash wash4"></div></div>

<div id="loginScreen" class="content min-h-screen flex items-center justify-center p-4" style="display:none;">
  <div class="login-card">
    <div class="text-center mb-2"><img src="logo.png" alt="Carease Command Corner" style="height:200px; border-radius:18px; margin:0 auto; box-shadow:0 10px 28px rgba(0,0,0,0.22);"></div>
    <div class="login-tagline mb-6">Built for the Revamp Team</div>
    <div id="loginError" class="text-red-500 text-sm mb-3 text-center" style="display:none;"></div>
    <div class="space-y-3">
      <input id="loginUser" class="input-field" placeholder="Username" autocomplete="username">
      <input id="loginPass" type="password" class="input-field" placeholder="Password" autocomplete="current-password">
      <label class="flex items-center gap-2 text-sm"><input id="rememberMe" type="checkbox" class="w-4 h-4 accent-black" checked>Remember me for 30 days</label>
      <button onclick="doLogin()" id="loginBtn" class="btn-primary w-full">Sign In</button>
    </div>
  </div>
</div>

<div id="app" class="content" style="display:none;">
  <div class="logo-corner"><img src="logo.png" alt="Carease Command Corner"><div class="logo-tagline">Built for the Revamp Team</div></div>

  <div class="fab-menu" id="fabMenu">
    <button class="fab-btn" onclick="toggleFab()" title="Menu">⋮</button>
    <div class="fab-panel" id="fabPanel">
      <div class="fab-user" id="fabUser"></div>
      <button class="fab-item primary" onclick="connectPC()">+ Add PC</button>
      <button class="fab-item" onclick="connectMain()">+ Add Main</button>
      <button class="fab-item" onclick="loadOrgs();closeFab()">↻ Refresh</button>
      <button class="fab-item" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="wheel-stage">
    <div id="orgsLoading" class="text-center py-8"><div class="loader-ring"></div></div>
    <div id="orgsContainer" class="w-full"></div>
  </div>

  <div class="runs-section max-w-6xl mx-auto mb-8">
    <h2 class="text-lg font-bold mb-3">Recent Runs</h2>
    <div id="runsList" class="runs-list">Loading...</div>
  </div>
</div>

<div id="confirmModal" class="modal-backdrop"><div class="modal p-6" style="max-width: 480px;"><div class="confirm-icon" id="confirmIcon">▶</div><h3 class="text-xl font-bold text-center mb-2" id="confirmTitle">Confirm Run</h3><p class="text-center mb-6" id="confirmBody"></p><div class="flex gap-3"><button onclick="closeConfirm()" class="btn-secondary flex-1">Cancel</button><button onclick="acceptConfirm()" class="btn-primary flex-1">Continue</button></div></div></div>
<div id="modal" class="modal-backdrop"><div class="modal p-6"><div class="flex items-center justify-between mb-4"><h3 id="modalTitle" class="text-xl font-bold">Result</h3><div class="flex gap-2"><button onclick="minimizeModal()" class="btn-secondary text-sm">−</button><button id="modalCloseBtn" onclick="closeModal()" class="btn-secondary text-sm modal-close-btn">×</button></div></div><div id="modalBody"></div></div></div>

<div id="resultFloat" class="result-float" onclick="reopenModal()">
  <div class="result-float-header">
    <span id="resultFloatTitle" class="result-float-title">Working...</span>
    <span id="resultFloatStatus" class="result-float-status running">Running</span>
  </div>
  <div id="resultFloatBody" class="result-float-body">Task in progress...</div>
  <div class="result-float-cta">Click to expand ↗</div>
</div><script>
const API = 'https://carease-intercompany-production.up.railway.app';
const TOKEN_KEY = 'carease_session_token';
let sessionToken = localStorage.getItem(TOKEN_KEY) || null;
let orgs = [];
let currentUsername = null;
let currentModalContent = null;
let audioCtx = null;
let isTaskRunning = false;

const SEG_COLORS = [
  '#B71C1C','#4A148C','#01579B','#004D40','#3E2723','#880E4F','#0D47A1',
  '#1B5E20','#4E342E','#311B92','#00695C','#4A148C','#37474F','#6A1B9A',
  '#0277BD','#33691E','#78909C'
];

function playIntroSegments() {
  const wheel = document.getElementById('splashWheel');
  if (!wheel) return;
  const n = 14; const R = 190;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * R, y = Math.sin(angle) * R;
    const seg = document.createElement('div');
    seg.className = 'splash-seg';
    seg.style.background = SEG_COLORS[i % SEG_COLORS.length];
    seg.animate([
      { transform: 'translate(0,0) scale(0.3)', opacity: 0 },
      { transform: 'translate(' + x + 'px,' + y + 'px) scale(1)', opacity: 1 }
    ], { duration: 700, delay: 800 + i * 80, easing: 'cubic-bezier(0.34,1.56,0.64,1)', fill: 'forwards' });
    wheel.appendChild(seg);
  }
}
playIntroSegments();

setTimeout(() => {
  document.getElementById('splash').style.display = 'none';
  if (sessionToken) checkSession(); else showLogin();
}, 3400);

function initDates() {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  return { start: first.toISOString().slice(0,10), end: last.toISOString().slice(0,10) };
}
let defaultDates = initDates();

async function checkSession() {
  try {
    const r = await fetch(API + '/auth/me', {headers: {'X-Session-Token': sessionToken}});
    if (r.ok) { const data = await r.json(); currentUsername = data.username; showApp(); }
    else { localStorage.removeItem(TOKEN_KEY); sessionToken = null; showLogin(); }
  } catch (e) { showLogin(); }
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const remember = document.getElementById('rememberMe').checked;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Enter username and password'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="loader-small"></span> Signing in...';
  try {
    const r = await fetch(API + '/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
    const data = await r.json();
    if (r.ok && data.token) {
      sessionToken = data.token;
      if (remember) localStorage.setItem(TOKEN_KEY, sessionToken);
      currentUsername = data.username;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
      showApp();
    } else { errEl.textContent = 'Invalid username or password'; errEl.style.display = 'block'; }
  } catch (e) { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
  btn.disabled = false; btn.innerHTML = 'Sign In';
}

document.addEventListener('keypress', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin();
});

async function doLogout() {
  if (!confirm('Log out?')) return;
  try { await fetch(API + '/auth/logout', {method: 'POST', headers: {'X-Session-Token': sessionToken}}); } catch (e) {}
  localStorage.removeItem(TOKEN_KEY);
  sessionToken = null; currentUsername = null;
  showLogin();
}

function showLogin() { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('fabUser').textContent = currentUsername ? '@' + currentUsername : '';
  loadOrgs(); loadRuns();
}

async function api(path, opts) {
  const options = opts || {};
  options.headers = options.headers || {};
  options.headers['X-Session-Token'] = sessionToken;
  const r = await fetch(API + path, options);
  if (r.status === 401) { showLogin(); throw new Error('Session expired'); }
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

function connectMain() { window.location.href = API + '/connect?role=main'; }
function connectPC() { window.location.href = API + '/connect?role=pc'; }

function toggleFab() { document.getElementById('fabPanel').classList.toggle('open'); }
function closeFab() { document.getElementById('fabPanel').classList.remove('open'); }
document.addEventListener('click', (e) => {
  const menu = document.getElementById('fabMenu');
  if (menu && !menu.contains(e.target)) closeFab();
});

async function loadOrgs() {
  document.getElementById('orgsLoading').style.display = 'block';
  document.getElementById('orgsContainer').innerHTML = '';
  try { orgs = await api('/orgs'); renderWheel(); }
  catch (e) { document.getElementById('orgsContainer').innerHTML = '<p class="text-red-500 text-center">' + e.message + '</p>'; }
  finally { document.getElementById('orgsLoading').style.display = 'none'; }
}

function shortLabel(name) {
  const stateMatch = name.match(/\b([A-Z]{2})\b/);
  const pcMatch = name.match(/(PC|P\.C\.|P\.A\.)\s*(\d+)/i);
  const top = stateMatch ? stateMatch[1] : (name.length > 8 ? name.slice(0,7) : name);
  const bottom = pcMatch ? pcMatch[0].replace(/\s+/g,' ').toUpperCase() : '';
  return { top, bottom };
}
function polarToCart(cx, cy, r, angle) { return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r }; }
function slicePath(cx, cy, rIn, rOut, a1, a2) {
  const p1 = polarToCart(cx, cy, rOut, a1), p2 = polarToCart(cx, cy, rOut, a2);
  const p3 = polarToCart(cx, cy, rIn, a2), p4 = polarToCart(cx, cy, rIn, a1);
  const large = (a2 - a1) > Math.PI ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${rOut} ${rOut} 0 ${large} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rIn} ${rIn} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
}
function shade(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  const factor = 1 + pct / 100;
  r = Math.max(0, Math.min(255, Math.round(r * factor)));
  g = Math.max(0, Math.min(255, Math.round(g * factor)));
  b = Math.max(0, Math.min(255, Math.round(b * factor)));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function renderWheel() {
  const main = orgs.find(c => c.role === 'main');
  const pcs = orgs.filter(c => c.role === 'pc');
  const container = document.getElementById('orgsContainer');
  if (!main && !pcs.length) { container.innerHTML = '<p class="text-center py-8 opacity-70">No organizations connected. Use the menu (top-right) to add Main and PCs.</p>'; return; }
  const size = 720, cx = size/2, cy = size/2, rOut = 340, rIn = 195, gap = 0.010;
  const n = Math.max(pcs.length, 1);
  let defs = '<defs>';
  for (let i = 0; i < pcs.length; i++) {
    const c = SEG_COLORS[i % SEG_COLORS.length];
    defs += `<radialGradient id="segGrad${i}" cx="50%" cy="30%" r="80%"><stop offset="0%" stop-color="${shade(c,22)}"/><stop offset="60%" stop-color="${c}"/><stop offset="100%" stop-color="${shade(c,-35)}"/></radialGradient>`;
  }
  defs += `<radialGradient id="innerShadow" cx="50%" cy="50%" r="50%"><stop offset="80%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/></radialGradient></defs>`;

  let svgSegs = '';
  for (let i = 0; i < pcs.length; i++) {
    const a1 = (i / n) * Math.PI * 2 - Math.PI / 2 + gap;
    const a2 = ((i + 1) / n) * Math.PI * 2 - Math.PI / 2 - gap;
    const path = slicePath(cx, cy, rIn, rOut, a1, a2);
    const mid = (a1 + a2) / 2;
    const lp = polarToCart(cx, cy, (rIn + rOut) / 2, mid);
    const s = shortLabel(pcs[i].name);
    const escapedName = pcs[i].name.replace(/'/g, "\\'").replace(/"/g,'&quot;');
    svgSegs += `<g class="wheel-segment" style="animation-delay:${i*0.05}s, ${i*0.15}s;" onclick="openPCActions('${pcs[i].realm_id}')">`
      + `<title>${escapedName}</title>`
      + `<path d="${path}" fill="url(#segGrad${i})"/>`
      + `<path d="${path}" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>`
      + `<text class="seg-code" x="${lp.x}" y="${lp.y - 4}" text-anchor="middle" dominant-baseline="middle">${s.top}</text>`
      + (s.bottom ? `<text class="seg-num" x="${lp.x}" y="${lp.y + 12}" text-anchor="middle" dominant-baseline="middle">${s.bottom}</text>` : '')
      + `</g>`;
  }
  svgSegs += `<circle cx="${cx}" cy="${cy}" r="${rIn + 3}" fill="url(#innerShadow)" pointer-events="none"/>`;

  const mainName = main ? main.name : 'No Main';
  let html = '<div class="wheel-outer"><div class="wheel-container">';
  html += `<svg class="wheel-svg" viewBox="0 0 ${size} ${size}">${defs}${svgSegs}</svg>`;
  html += `<div class="wheel-hub"><div class="hub-label">MAIN</div><div class="hub-name">${mainName}</div>`;
  html += `<div class="hub-dates"><input id="startDate" type="date" class="hub-input" value="${defaultDates.start}"><span style="opacity:0.5;font-size:12px;">→</span><input id="endDate" type="date" class="hub-input" value="${defaultDates.end}"></div>`;
  html += '<label class="hub-toggle"><input id="dryRunToggle" type="checkbox" checked>Dry Run</label>';
  html += `<button class="hub-run-btn" onclick="askRunAll()">▶ RUN ALL PCs</button></div></div></div>`;
  container.innerHTML = html;
}

function openPCActions(realmId) {
  const org = orgs.find(c => c.realm_id === realmId);
  if (!org) return;
  const isMain = org.role === 'main';
  const safeName = org.name.replace(/'/g, "\\'");
  let html = '<p class="text-center opacity-70 mb-3">Realm <span class="font-mono">' + org.realm_id + '</span></p><div class="pc-actions">';
  if (!isMain) {
    html += '<div class="action-btn" onclick="closeModal();syncPC(\'' + realmId + '\')"><span class="action-icon">🔄</span>Sync Items & Accounts</div>';
    html += '<div class="action-btn" onclick="closeModal();dryRunPC(\'' + realmId + '\')"><span class="action-icon">👁</span>Dry Run</div>';
    html += '<div class="action-btn primary" onclick="closeModal();askRunPC(\'' + realmId + '\',\'' + safeName + '\')"><span class="action-icon">▶</span>Run for Real</div>';
    html += '<div class="action-btn" onclick="closeModal();viewFlagged(\'' + realmId + '\')"><span class="action-icon">⚑</span>View Flagged</div>';
  } else {
    html += '<div class="action-btn" style="grid-column:1/-1;"><span class="action-icon">👑</span>Main Company<div class="text-xs opacity-60 mt-1">Runs affect this org as source</div></div>';
  }
  html += '</div>';
  openModal(org.name, html);
}

function setRunning(flag, title, body) {
  isTaskRunning = flag;
  const closeBtn = document.getElementById('modalCloseBtn');
  if (flag) { closeBtn.classList.add('hidden'); showFloat(title || 'Working...', body || 'Task in progress...', 'running'); }
  else { closeBtn.classList.remove('hidden'); }
}
function showFloat(title, body, statusClass) {
  const el = document.getElementById('resultFloat');
  document.getElementById('resultFloatTitle').textContent = title;
  document.getElementById('resultFloatBody').innerHTML = body;
  const statusEl = document.getElementById('resultFloatStatus');
  statusEl.className = 'result-float-status ' + statusClass;
  statusEl.textContent = statusClass === 'running' ? 'Running' : (statusClass === 'error' ? 'Error' : 'Done');
  el.classList.add('show');
}
function hideFloat() { document.getElementById('resultFloat').classList.remove('show'); }

async function syncPC(realmId) {
  setRunning(true, 'Syncing', 'Fetching items & accounts...');
  openModal('Syncing...', '<div class="text-center py-8"><div class="loader-ring"></div></div>');
  try {
    const r = await api('/sync/' + realmId);
    setRunning(false);
    openModal('Synced ✓', '<div class="space-y-2"><p class="font-bold text-lg">' + r.name + '</p><p>Items: ' + r.items + '</p><p>Accounts: ' + r.accounts + '</p></div>');
    showFloat('Synced: ' + r.name, r.items + ' items · ' + r.accounts + ' accounts', 'done');
  } catch (e) { setRunning(false); openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); showFloat('Sync failed', e.message, 'error'); }
}

function askRunPC(realmId, name) { showConfirm('Confirm Real Run', 'This will fetch expenses for <b>' + name + '</b>. If any lines need your input, you\'ll be asked before anything is posted.', '▶', () => runPCInteractive(realmId, name)); }
function askRunAll() {
  const dry = document.getElementById('dryRunToggle').checked;
  const pcs = orgs.filter(c => c.role === 'pc');
  if (!pcs.length) return alert('No PCs to run');
  if (dry) showConfirm('Dry Run All PCs', 'Preview all ' + pcs.length + ' PCs. Nothing posted.', '👁', runAll);
  else showConfirm('REAL Run All PCs', 'Create invoices and bills for ALL ' + pcs.length + ' PCs. At the end, you\'ll be asked to categorize any flagged lines in one screen.', '▶', runAll);
}
function getDates() { return { start: document.getElementById('startDate').value, end: document.getElementById('endDate').value }; }

async function dryRunPC(realmId) {
  const d = getDates();
  if (!d.start || !d.end) return alert('Pick a date range');
  const org = orgs.find(c => c.realm_id === realmId);
  const name = org ? org.name : realmId;
  setRunning(true, 'Dry Run: ' + name, 'Analyzing expenses...');
  openModal('Running dry-run...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Analyzing expenses...</p></div>');
  try {
    const r = await api('/run/' + realmId + '?start=' + d.start + '&end=' + d.end + '&dry_run=true');
    setRunning(false);
    openModal('Dry Run Result', renderRunResult(r));
    showFloat('Dry Run Done: ' + name, (r.billable_expenses_found || 0) + ' lines · $' + (r.subtotal || 0).toFixed(2), 'done');
  } catch (e) { setRunning(false); openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); showFloat('Dry Run failed', e.message, 'error'); }
}

async function runPCInteractive(realmId, name) {
  const d = getDates();
  if (!d.start || !d.end) return alert('Pick a date range');
  const orgName = name || (orgs.find(c => c.realm_id === realmId) || {}).name || realmId;
  setRunning(true, 'Preflight: ' + orgName, 'Analyzing and categorizing...');
  openModal('Analyzing...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Categorizing expenses...</p></div>');
  try {
    const preflight = await api('/preflight/' + realmId + '?start=' + d.start + '&end=' + d.end);
    if (preflight.error) throw new Error(preflight.error);
    if (preflight.total_charges === 0) {
      setRunning(false);
      openModal('No Expenses', '<p class="text-center py-4">No billable expenses in this period for <b>' + orgName + '</b>.</p>');
      showFloat('No Expenses: ' + orgName, 'Nothing to invoice', 'done');
      return;
    }
    if (preflight.flagged && preflight.flagged.length > 0) {
      playDing(); setTimeout(playDing, 250);
      await showSinglePCFlaggedResolver(realmId, orgName, d, preflight);
    } else {
      await commitAndFinish(realmId, orgName, d, preflight.categorized, []);
    }
  } catch (e) {
    setRunning(false);
    openModal('Error', '<p class="text-red-600">' + e.message + '</p>');
    showFloat('Run failed', e.message, 'error');
  }
}

async function showSinglePCFlaggedResolver(realmId, orgName, dates, preflight) {
  showFloat('Awaiting input: ' + orgName, preflight.flagged.length + ' lines need categorization', 'running');
  openModal('Loading account list...', '<div class="text-center py-8"><div class="loader-ring"></div></div>');
  const accountsResp = await api('/pc-accounts/' + realmId);
  const accounts = accountsResp.accounts || [];
  let optionsHtml = '<option value="">-- Select account --</option>';
  for (const a of accounts) {
    optionsHtml += '<option value="' + a.id + '">' + a.name + ' (' + (a.subtype || a.type) + ')</option>';
  }
  let html = '<p class="mb-4 text-sm"><b>' + preflight.flagged.length + ' line(s)</b> couldn\'t be auto-categorized for <b>' + orgName + '</b>. Pick an account for each. Your choices will be remembered for future runs.</p>';
  html += '<div id="flaggedContainer">';
  for (let i = 0; i < preflight.flagged.length; i++) {
    const f = preflight.flagged[i];
    html += '<div class="flag-item" data-index="' + i + '">'
      + '<div class="flag-desc">' + (f.description || '(no description)') + '</div>'
      + '<div class="flag-meta">$' + f.amount.toFixed(2) + ' · ' + (f.txn_date || '') + '</div>'
      + '<div class="flag-reason">🤖 ' + (f.reasoning || '') + '</div>'
      + '<select class="flag-select" data-index="' + i + '">' + optionsHtml + '</select>'
      + '</div>';
  }
  html += '</div>';
  html += '<div class="flex gap-3 mt-4"><button onclick="cancelFlagged()" class="btn-secondary flex-1">Cancel Run</button><button onclick="submitFlagged(\'' + realmId + '\', \'' + orgName.replace(/'/g,"\\'") + '\')" class="btn-primary flex-1">Continue & Post</button></div>';
  openModal('⚑ Action Required: ' + preflight.flagged.length + ' Flagged Line(s)', html);
  window._pendingPreflight = { realmId, orgName, dates, preflight };
  isTaskRunning = false;
  document.getElementById('modalCloseBtn').classList.remove('hidden');
}

function cancelFlagged() {
  window._pendingPreflight = null;
  closeModal(); hideFloat();
  showFloat('Run Cancelled', 'No changes made', 'error');
}

async function submitFlagged(realmId, orgName) {
  const pending = window._pendingPreflight;
  if (!pending) return;
  const selects = document.querySelectorAll('.flag-select');
  const resolutions = [];
  for (const s of selects) {
    const idx = parseInt(s.dataset.index);
    if (!s.value) { alert('Pick an account for all flagged lines'); return; }
    const f = pending.preflight.flagged[idx];
    resolutions.push({
      reimburse_charge_id: f.reimburse_charge_id,
      description: f.description, amount: f.amount, txn_date: f.txn_date,
      account_id: s.value
    });
  }
  window._pendingPreflight = null;
  await commitAndFinish(realmId, orgName, pending.dates, pending.preflight.categorized, resolutions);
}

async function commitAndFinish(realmId, orgName, dates, categorized, flaggedResolutions) {
  setRunning(true, 'Posting: ' + orgName, 'Creating invoice and bill...');
  openModal('Posting to QBO...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Creating invoice and bill...</p></div>');
  try {
    const r = await api('/commit/' + realmId, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ start: dates.start, end: dates.end, categorized, flagged_resolutions: flaggedResolutions })
    });
    setRunning(false);
    if (r.status === 'done') playDing();
    openModal('Done ✓', renderRunResult(r));
    showFloat('Done: ' + orgName, '#' + (r.doc_number || r.invoice_id) + ' · ' + (r.lines_total || 0) + ' lines', r.status === 'done' ? 'done' : 'error');
    loadRuns();
  } catch (e) { setRunning(false); openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); showFloat('Commit failed', e.message, 'error'); }
}

// ===== Run All: batch, collect flagged at end =====
async function runAll() {
  const dry = document.getElementById('dryRunToggle').checked;
  const pcs = orgs.filter(c => c.role === 'pc');
  const d = getDates();
  setRunning(true, dry ? 'Dry Run All' : 'Run All', '0 / ' + pcs.length + ' complete');
  openModal(dry ? 'Dry Running All PCs' : 'Running All PCs', '<div id="allResults" class="space-y-2"></div>');
  const results = document.getElementById('allResults');
  const summary = { success: 0, error: 0, partial: 0 };
  const batchFlagged = []; // { realmId, pcName, billId, flagged: [] }
  let done = 0;

  for (const pc of pcs) {
    const row = document.createElement('div');
    row.className = 'p-3 rounded-lg border-2 border-black bg-white flex items-center gap-3';
    row.innerHTML = '<span class="loader-small"></span><span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs opacity-60">running...</span>';
    results.appendChild(row);
    try {
      const r = await api('/run/' + pc.realm_id + '?start=' + d.start + '&end=' + d.end + (dry ? '&dry_run=true' : ''));
      let badge, detail;
      if (r.status === 'error') { badge = '<span class="badge badge-error">Error</span>'; detail = r.error || 'Failed'; summary.error++; }
      else if (r.status === 'partial') { badge = '<span class="badge badge-partial">Partial</span>'; detail = r.error || 'Partial'; summary.partial++; }
      else if (r.dry_run) { badge = '<span class="badge badge-done">Preview</span>'; detail = (r.billable_expenses_found||0) + ' lines · $' + (r.subtotal||0).toFixed(2); summary.success++; }
      else {
        badge = '<span class="badge badge-done">Done</span>';
        detail = '#' + r.doc_number + ' · ' + r.lines_total + ' lines';
        if (r.lines_flagged) detail += ' · ' + r.lines_flagged + ' flagged';
        summary.success++;
        playDing();
        // Collect flagged for batch resolution
        if (r.flagged_lines && r.flagged_lines.length > 0 && r.bill_id) {
          batchFlagged.push({ realmId: pc.realm_id, pcName: pc.name, billId: r.bill_id, flagged: r.flagged_lines });
        }
      }
      row.innerHTML = badge + '<span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs opacity-70">' + detail + '</span>';
    } catch (e) {
      row.innerHTML = '<span class="badge badge-error">Error</span><span class="font-bold flex-1 truncate">' + pc.name + '</span><span class="text-xs text-red-600">' + e.message + '</span>';
      summary.error++;
    }
    done++;
    showFloat(dry ? 'Dry Run All' : 'Run All', done + ' / ' + pcs.length + ' complete', 'running');
  }
  setRunning(false);
  const banner = document.createElement('div');
  banner.className = 'mt-4 p-4 rounded-xl';
  banner.style = 'background: #1a1a1a; color: #F5C518; border: 3px solid #1a1a1a;';
  banner.innerHTML = '<div class="flex items-center gap-4 justify-center text-sm font-bold"><span>✓ ' + summary.success + ' success</span><span>⚠ ' + summary.partial + ' partial</span><span>✗ ' + summary.error + ' failed</span></div>';
  results.appendChild(banner);
  showFloat(dry ? 'Dry Run All Done' : 'Run All Done', '✓ ' + summary.success + ' · ⚠ ' + summary.partial + ' · ✗ ' + summary.error, summary.error ? 'error' : 'done');

  if (!dry) {
    loadRuns();
    // If any flagged lines across PCs, show batch resolver
    if (batchFlagged.length > 0) {
      const totalFlagged = batchFlagged.reduce((sum, b) => sum + b.flagged.length, 0);
      playDing(); setTimeout(playDing, 250); setTimeout(playDing, 500);
      await showBatchFlaggedResolver(batchFlagged, totalFlagged);
    }
  }
}

async function showBatchFlaggedResolver(batchFlagged, totalFlagged) {
  setRunning(true, 'Batch Flagged: ' + totalFlagged + ' lines', 'Loading accounts for each PC...');
  openModal('Loading accounts...', '<div class="text-center py-8"><div class="loader-ring"></div><p class="mt-4">Fetching account lists for ' + batchFlagged.length + ' PCs...</p></div>');

  // Fetch accounts for each PC in parallel
  const accountMap = {};
  await Promise.all(batchFlagged.map(async (b) => {
    try {
      const resp = await api('/pc-accounts/' + b.realmId);
      accountMap[b.realmId] = resp.accounts || [];
    } catch (e) {
      accountMap[b.realmId] = [];
    }
  }));

  let html = '<p class="mb-4 text-sm"><b>' + totalFlagged + ' line(s)</b> across <b>' + batchFlagged.length + ' PC(s)</b> need categorization. Pick an account for each. Your choices will be remembered for future runs.</p>';
  let globalIdx = 0;
  window._batchFlagged = batchFlagged;
  window._batchIdxMap = {};

  for (let bi = 0; bi < batchFlagged.length; bi++) {
    const b = batchFlagged[bi];
    const accounts = accountMap[b.realmId] || [];
    let optionsHtml = '<option value="">-- Select account --</option>';
    for (const a of accounts) {
      optionsHtml += '<option value="' + a.id + '">' + a.name + ' (' + (a.subtype || a.type) + ')</option>';
    }
    html += '<div class="flag-group-header">' + b.pcName + ' — Bill ' + b.billId + ' · ' + b.flagged.length + ' line(s)</div>';
    for (let fi = 0; fi < b.flagged.length; fi++) {
      const f = b.flagged[fi];
      window._batchIdxMap[globalIdx] = { batchIdx: bi, flaggedIdx: fi };
      html += '<div class="flag-item">'
        + '<div class="flag-desc">' + (f.description || '(no description)') + '</div>'
        + '<div class="flag-meta">$' + f.amount.toFixed(2) + ' · ' + (f.txn_date || '') + '</div>'
        + '<div class="flag-reason">🤖 ' + (f.reasoning || '') + '</div>'
        + '<select class="flag-select" data-gidx="' + globalIdx + '">' + optionsHtml + '</select>'
        + '</div>';
      globalIdx++;
    }
  }
  html += '<div class="flex gap-3 mt-4"><button onclick="cancelBatchFlagged()" class="btn-secondary flex-1">Skip All (keep bills as-is)</button><button onclick="submitBatchFlagged()" class="btn-primary flex-1">Add Lines to Bills</button></div>';

  setRunning(false);
  openModal('⚑ Batch Categorization: ' + totalFlagged + ' Flagged Line(s)', html);
}

function cancelBatchFlagged() {
  window._batchFlagged = null;
  window._batchIdxMap = null;
  closeModal(); hideFloat();
  showFloat('Batch cancelled', 'Bills left as-is with flagged lines missing', 'error');
}

async function submitBatchFlagged() {
  const batch = window._batchFlagged;
  const idxMap = window._batchIdxMap;
  if (!batch || !idxMap) return;
  const selects = document.querySelectorAll('.flag-select');

  // Group resolutions by batchIdx
  const resolutionsByBatch = {};
  for (const s of selects) {
    const gidx = parseInt(s.dataset.gidx);
    if (!s.value) { alert('Pick an account for all flagged lines'); return; }
    const map = idxMap[gidx];
    const f = batch[map.batchIdx].flagged[map.flaggedIdx];
    if (!resolutionsByBatch[map.batchIdx]) resolutionsByBatch[map.batchIdx] = [];
    resolutionsByBatch[map.batchIdx].push({
      description: f.description,
      amount: f.amount,
      account_id: s.value
    });
  }

  window._batchFlagged = null;
  window._batchIdxMap = null;

  setRunning(true, 'Adding to bills', '0 / ' + Object.keys(resolutionsByBatch).length);
  openModal('Adding lines to bills...', '<div id="batchAddResults" class="space-y-2"></div>');
  const results = document.getElementById('batchAddResults');

  let done = 0, ok = 0, err = 0;
  for (const bi in resolutionsByBatch) {
    const b = batch[bi];
    const row = document.createElement('div');
    row.className = 'p-3 rounded-lg border-2 border-black bg-white flex items-center gap-3';
    row.innerHTML = '<span class="loader-small"></span><span class="font-bold flex-1 truncate">' + b.pcName + '</span><span class="text-xs opacity-60">adding...</span>';
    results.appendChild(row);
    try {
      const r = await api('/add-lines-to-bill/' + b.realmId, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ bill_id: b.billId, resolutions: resolutionsByBatch[bi] })
      });
      row.innerHTML = '<span class="badge badge-done">Done</span><span class="font-bold flex-1 truncate">' + b.pcName + '</span><span class="text-xs opacity-70">+' + r.lines_added + ' lines</span>';
      ok++;
    } catch (e) {
      row.innerHTML = '<span class="badge badge-error">Error</span><span class="font-bold flex-1 truncate">' + b.pcName + '</span><span class="text-xs text-red-600">' + e.message + '</span>';
      err++;
    }
    done++;
    showFloat('Adding to bills', done + ' / ' + Object.keys(resolutionsByBatch).length, 'running');
  }
  setRunning(false);
  const banner = document.createElement('div');
  banner.className = 'mt-4 p-4 rounded-xl';
  banner.style = 'background: #1a1a1a; color: #F5C518; border: 3px solid #1a1a1a;';
  banner.innerHTML = '<div class="flex items-center gap-4 justify-center text-sm font-bold"><span>✓ ' + ok + ' bills updated</span><span>✗ ' + err + ' failed</span></div>';
  results.appendChild(banner);
  showFloat('Batch complete', '✓ ' + ok + ' · ✗ ' + err, err ? 'error' : 'done');
  playDing();
  loadRuns();
}

function renderRunResult(r) {
  if (r.error && !r.status) return '<p class="text-red-600 font-bold">' + r.error + ': ' + (r.detail || '') + '</p>';
  if (r.dry_run) {
    let html = '<div class="grid grid-cols-2 gap-3 mb-4 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">State:</span> <b>' + r.state_code + '</b></div><div><span class="opacity-60">Period:</span> ' + r.period + '</div><div><span class="opacity-60">Expenses:</span> ' + r.billable_expenses_found + '</div><div><span class="opacity-60">Subtotal:</span> $' + r.subtotal.toFixed(2) + '</div><div><span class="opacity-60">MSA (20%):</span> $' + r.msa_amount_20pct.toFixed(2) + '</div><div class="col-span-2 pt-2 border-t border-black"><span class="opacity-60">Invoice Total:</span> <span class="text-lg font-bold">$' + r.invoice_total.toFixed(2) + '</span></div></div><h4 class="font-bold mb-2 text-sm uppercase tracking-wide">Line Items</h4><div class="space-y-2">';
    for (const l of r.line_previews) {
      const dot = l.confidence === 'high' ? '🟢' : (l.confidence === 'low' ? '🟡' : '🔴');
      html += '<div class="p-3 rounded-lg border-2 border-black"><div class="flex justify-between items-start gap-2"><span class="text-sm">' + dot + ' ' + l.description + '</span><b>$' + l.amount.toFixed(2) + '</b></div><div class="text-xs opacity-70 mt-1">' + (l.reasoning || '') + '</div></div>';
    }
    html += '</div><p class="mt-4 text-xs italic opacity-60 text-center">' + r.note + '</p>';
    return html;
  }
  if (r.status === 'done') { return '<div class="space-y-3 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">Invoice:</span> <b>#' + (r.doc_number || r.invoice_id) + '</b></div><div><span class="opacity-60">Bill created:</span> id ' + (r.bill_id || '?') + '</div><div><span class="opacity-60">Lines:</span> ' + r.lines_total + ' · ' + (r.lines_flagged || 0) + ' flagged</div><div class="pt-3 mt-3 border-t border-black text-center"><span class="badge badge-done">✓ Complete</span></div></div>'; }
  if (r.status === 'partial') { return '<div class="space-y-2 text-sm"><div><span class="opacity-60">PC:</span> <b>' + r.pc + '</b></div><div><span class="opacity-60">Invoice created:</span> <b>#' + (r.doc_number || r.invoice_id) + '</b></div><div class="text-orange-600"><b>Issue:</b> ' + r.error + '</div></div>'; }
  if (r.status === 'no_expenses') { return '<p class="text-center py-4">No billable expenses in this period for <b>' + r.pc + '</b>.</p>'; }
  return '<pre class="text-xs bg-gray-100 p-3 rounded overflow-x-auto">' + JSON.stringify(r, null, 2) + '</pre>';
}

async function viewFlagged(realmId) {
  openModal('Loading flagged...', '<div class="text-center py-8"><div class="loader-ring"></div></div>');
  try {
    const r = await api('/flagged/' + realmId);
    if (!r.flagged.length) { openModal(r.name + ' — Flagged', '<p class="text-center py-4">No flagged items 🎉</p>'); return; }
    let html = '<div class="space-y-2">';
    for (const f of r.flagged) {
      html += '<div class="p-3 rounded-lg border-2 border-black"><div class="font-bold text-sm">' + f.description + '</div><div class="text-xs opacity-70 mt-1">' + f.reasoning + '</div><div class="text-xs mt-2">Confidence: <b>' + f.confidence + '</b></div></div>';
    }
    html += '</div>';
    openModal(r.name + ' — Flagged', html);
  } catch (e) { openModal('Error', '<p class="text-red-600">' + e.message + '</p>'); }
}

async function loadRuns() {
  const el = document.getElementById('runsList');
  el.innerHTML = '<div class="text-center py-4"><div class="loader-small"></div></div>';
  try {
    const runs = await api('/runs');
    if (!runs.length) { el.innerHTML = '<p class="text-center py-4 opacity-60">No runs yet</p>'; return; }
    let html = '';
    for (const r of runs) {
      const cls = r.status === 'done' ? 'status-done' : (r.status === 'error' ? 'status-error' : 'status-running');
      const when = new Date(r.started_at).toLocaleString();
      const org = r.companies || {};
      const runData = encodeURIComponent(JSON.stringify(r));
      const docLabel = r.invoice_id ? ('Invoice #' + (r.doc_number || r.invoice_id)) : ('Run ' + r.id);
      html += '<div class="run-strip" onclick="viewRunDetail(\'' + runData + '\')">'
        + '<span class="status-dot ' + cls + '"></span>'
        + '<div class="flex-1 min-w-0"><div class="font-bold truncate">' + docLabel + ' · ' + (org.name || '?') + '</div>'
        + '<div class="text-xs opacity-70">' + r.period_start + ' → ' + r.period_end + ' · ' + (r.lines_total || 0) + ' lines · ' + (r.lines_flagged || 0) + ' flagged</div></div>'
        + '<div class="text-xs opacity-60 text-right flex-shrink-0 hidden sm:block">' + when + '</div></div>';
    }
    el.innerHTML = html;
  } catch (e) { el.innerHTML = '<p class="text-red-600">' + e.message + '</p>'; }
}

function viewRunDetail(encoded) {
  const r = JSON.parse(decodeURIComponent(encoded));
  const org = r.companies || {};
  const cls = r.status === 'done' ? 'badge-done' : (r.status === 'error' ? 'badge-error' : 'badge-partial');
  let html = '<div class="space-y-3 text-sm"><div><span class="opacity-60">Company:</span> <b>' + (org.name || '?') + '</b></div><div><span class="opacity-60">Period:</span> ' + r.period_start + ' to ' + r.period_end + '</div><div><span class="opacity-60">Status:</span> <span class="badge ' + cls + '">' + r.status + '</span></div><div><span class="opacity-60">Started:</span> ' + new Date(r.started_at).toLocaleString() + '</div>';
  if (r.finished_at) html += '<div><span class="opacity-60">Finished:</span> ' + new Date(r.finished_at).toLocaleString() + '</div>';
  if (r.invoice_id) html += '<div><span class="opacity-60">Invoice ID:</span> <b>' + r.invoice_id + '</b></div>';
  if (r.bill_id) html += '<div><span class="opacity-60">Bill ID:</span> <b>' + r.bill_id + '</b></div>';
  html += '<div><span class="opacity-60">Lines total:</span> ' + (r.lines_total || 0) + '</div><div><span class="opacity-60">Lines flagged:</span> ' + (r.lines_flagged || 0) + '</div>';
  if (r.error_message) html += '<div class="text-red-600 pt-2 border-t border-black"><b>Error:</b> ' + r.error_message + '</div>';
  html += '</div>';
  openModal('Run Details', html);
}

function openModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  currentModalContent = {title: title, body: body};
}
function closeModal() {
  if (isTaskRunning) return;
  document.getElementById('modal').classList.remove('open');
  hideFloat(); currentModalContent = null;
}
function minimizeModal() {
  document.getElementById('modal').classList.remove('open');
  if (currentModalContent && !document.getElementById('resultFloat').classList.contains('show')) {
    showFloat(currentModalContent.title, 'Click to expand', 'done');
  }
}
function reopenModal() { if (currentModalContent) { document.getElementById('modal').classList.add('open'); } }

let confirmCallback = null;
function showConfirm(title, body, icon, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').innerHTML = body;
  document.getElementById('confirmIcon').textContent = icon || '▶';
  confirmCallback = callback;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); confirmCallback = null; }
function acceptConfirm() { const cb = confirmCallback; closeConfirm(); if (cb) cb(); }

function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now); osc.stop(now + 0.5);
  } catch (e) {}
}
</script>
